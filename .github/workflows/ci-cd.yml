name: CI/CD

# Test on every push/PR; build + deploy to Azure Container Apps on push to main.
# Auth to Azure is keyless via OIDC (federated credential on the id-supplychain-cicd
# managed identity) — no stored Azure secret, just three non-sensitive IDs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for the OIDC token exchange in azure/login

env:
  RESOURCE_GROUP: rg-supplychain-agent
  ACR_NAME: acrsupplychain85768
  CONTAINER_APP: ca-supplychain
  IMAGE_REPO: supply-chain-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/ mock_data/
      - name: Test (pytest)
        run: pytest tests/ -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build in ACR (server-side — no Docker on the runner). Tag = commit SHA
      # for an immutable, traceable image.
      - name: Build image in ACR
        run: az acr build --registry "$ACR_NAME" --image "$IMAGE_REPO:${{ github.sha }}" .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            -g "$RESOURCE_GROUP" -n "$CONTAINER_APP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_REPO:${{ github.sha }}"
